name: 'Diploi Builder Action'
description: 'An action that builds components from a Diploi stack'
branding:
  icon: 'package'
  color: 'purple'

inputs:
  identifier:
    description: 'The identifier for the component'
    required: false
  folder:
    description: 'The folder for the component'
    required: true
  buildArgs:
    description: 'Static ENV values to be passed to the Docker build as ARGs'
    required: true
  name:
    description: 'Optional name for the build'
  type:
    description: 'The type of this build'
  project:
    description: 'Project name for the Diploi Docker registry'
    required: false
  registry:
    description: 'Hostname for the Diploi Docker registry'
    required: true
  username:
    description: 'User for the Diploi Docker registry'
    required: true
  password:
    description: 'Password for the Diploi Docker registry'
    required: true

runs:
  using: composite
  steps:
    - name: 'Set up QEMU'
      uses: docker/setup-qemu-action@v3

    - name: 'Set up Docker Buildx'
      uses: docker/setup-buildx-action@v3

    - name: 'Docker Meta'
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.registry }}${{ env.project && format('/{0}', env.project) || '' }}${{ inputs.identifier && format('/{0}', inputs.identifier) || '' }}
        tags: |
          type=ref,event=branch,enable=${{ inputs.type == 'main-dev' || inputs.type == 'main' }}
          type=ref,event=branch,suffix=-dev.,enable=${{ inputs.type == 'main-dev' || inputs.type == 'dev' }}

    - name: 'Log in to the Diploi Container Registry'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.registry }}
        username: ${{ env.username }}
        password: ${{ env.password }}

    - name: 'Set up .dockerignore'
      shell: bash
      run: |
        folder="${{ inputs.folder }}"
        if [[ -n "$folder" && "$folder" != "." && "$folder" != "/" && -f "$folder/.dockerignore" ]]; then
          awk -v folder="$folder" '
            /^#/ || /^$/ { print; next }
            /^!/ {
              pattern = substr($0, 2)
              if (pattern ~ /^\//) { print; next }
              if (pattern !~ /\//) { print "!" folder "/**/" pattern; next }
              print "!" folder "/" pattern; next
            }
            /^\// { print; next }
            !~/\// { print folder "/**/" $0; next }
            { print folder "/" $0 }
          ' "$folder/.dockerignore" >> .dockerignore
          echo "Generated .dockerignore:"
          cat .dockerignore
        fi

    - name: 'Build And Push'
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ inputs.folder }}/${{ inputs.type == 'dev' && 'Dockerfile.dev' || 'Dockerfile' }}
        pull: true
        push: ${{ github.event_name != 'pull_request' }}
        platforms: linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          ${{ inputs.buildArgs }}
          FOLDER=/app/${{ inputs.folder }}
